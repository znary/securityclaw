version: "1.0"
policy_version: "2026-03-13"
environment: "default"
defaults:
  approval_ttl_seconds: 900
  persist_mode: "compat"
hooks:
  before_prompt_build:
    enabled: true
    timeout_ms: 40
    fail_mode: "open"
  before_tool_call:
    enabled: true
    timeout_ms: 50
    fail_mode: "close"
  after_tool_call:
    enabled: true
    timeout_ms: 50
    fail_mode: "open"
  tool_result_persist:
    enabled: true
    timeout_ms: 50
    fail_mode: "close"
  message_sending:
    enabled: true
    timeout_ms: 40
    fail_mode: "open"
policies:
  - rule_id: "shell-block"
    group: "filesystem"
    enabled: true
    priority: 100
    decision: "block"
    reason_codes:
      - "SHELL_BLOCK"
    match:
      tool:
        - "shell.exec"
        - "exec"
  - rule_id: "contractor-network-challenge"
    group: "email"
    enabled: true
    priority: 80
    decision: "challenge"
    reason_codes:
      - "IDENTITY_REQUIRES_APPROVAL"
    challenge:
      ttl_seconds: 600
    match:
      identity:
        - "contractor"
      tool:
        - "network.http"
  - rule_id: "filesystem-list-challenge"
    group: "filesystem"
    enabled: true
    priority: 75
    decision: "challenge"
    reason_codes:
      - "FILE_ENUMERATION_REQUIRES_APPROVAL"
    challenge:
      ttl_seconds: 600
    match:
      tool:
        - "filesystem.list"
  - rule_id: "finance-write-warn"
    group: "filesystem"
    enabled: true
    priority: 60
    decision: "warn"
    reason_codes:
      - "FINANCE_WRITE_AUDIT"
    match:
      scope:
        - "finance"
      tool:
        - "filesystem.write"
dlp:
  on_dlp_hit: "sanitize"
  patterns:
    - name: "email"
      type: "pii"
      action: "mask"
      regex: "[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}"
      flags: "ig"
    - name: "api-key"
      type: "secret"
      action: "mask"
      regex: "sk-[A-Za-z0-9]{10,}"
    - name: "bearer-token"
      type: "token"
      action: "remove"
      regex: "Bearer\\s+[A-Za-z0-9._-]{12,}"
event_sink:
  webhook_url: ""
  timeout_ms: 3000
  max_buffer: 100
  retry_limit: 3
