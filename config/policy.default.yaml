version: "1.0"
policy_version: "2026-03-13"
environment: "prod"
defaults:
  approval_ttl_seconds: 900
  persist_mode: "compat"
hooks:
  before_prompt_build:
    enabled: true
    timeout_ms: 40
    fail_mode: "open"
  before_tool_call:
    enabled: true
    timeout_ms: 50
    fail_mode: "close"
  after_tool_call:
    enabled: true
    timeout_ms: 50
    fail_mode: "open"
  tool_result_persist:
    enabled: true
    timeout_ms: 50
    fail_mode: "close"
  message_sending:
    enabled: true
    timeout_ms: 40
    fail_mode: "open"
risk:
  base_score: 5
  warn_threshold: 35
  challenge_threshold: 60
  block_threshold: 85
  tags:
    untrusted: 20
    privileged: 15
    exfiltration: 25
  tools:
    shell.exec: 45
    exec: 45
    filesystem.write: 25
    network.http: 20
  scopes:
    prod: 30
    finance: 20
  identities:
    contractor: 20
    breakglass: 35
policies:
  - rule_id: "prod-shell-block"
    enabled: true
    priority: 100
    decision: "block"
    reason_codes:
      - "SCOPE_DENY"
      - "PROD_SHELL_BLOCK"
    match:
      scope:
        - "prod"
      tool:
        - "shell.exec"
        - "exec"
  - rule_id: "contractor-network-challenge"
    enabled: true
    priority: 80
    decision: "challenge"
    risk_threshold: 55
    reason_codes:
      - "IDENTITY_REQUIRES_APPROVAL"
    challenge:
      ttl_seconds: 600
    match:
      identity:
        - "contractor"
      tool:
        - "network.http"
  - rule_id: "prod-filesystem-list-challenge"
    enabled: true
    priority: 75
    decision: "challenge"
    reason_codes:
      - "SCOPE_DENY"
      - "PROD_FILE_ENUMERATION_REQUIRES_APPROVAL"
    challenge:
      ttl_seconds: 600
    match:
      scope:
        - "prod"
      tool:
        - "filesystem.list"
  - rule_id: "finance-write-warn"
    enabled: true
    priority: 60
    decision: "warn"
    reason_codes:
      - "FINANCE_WRITE_AUDIT"
    match:
      scope:
        - "finance"
      tool:
        - "filesystem.write"
dlp:
  on_dlp_hit: "sanitize"
  patterns:
    - name: "email"
      type: "pii"
      action: "mask"
      regex: "[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}"
      flags: "ig"
    - name: "api-key"
      type: "secret"
      action: "mask"
      regex: "sk-[A-Za-z0-9]{10,}"
    - name: "bearer-token"
      type: "token"
      action: "remove"
      regex: "Bearer\\s+[A-Za-z0-9._-]{12,}"
event_sink:
  webhook_url: ""
  timeout_ms: 3000
  max_buffer: 100
  retry_limit: 3
